<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0F1E;font-family:'Segoe UI',system-ui,sans-serif;color:#E2E8F0;overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0A0F1E;}
::-webkit-scrollbar-thumb{background:#1E2A3B;border-radius:3px;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}
@keyframes spin{to{transform:rotate(360deg);}}
select,input,textarea{font-family:inherit;}
select option{background:#111827;color:#E2E8F0;}
button{font-family:inherit;cursor:pointer;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;background:#111827;border-right:1px solid #1E2A3B;display:flex;flex-direction:column;transition:width .25s;overflow:hidden;flex-shrink:0;}
.sidebar.collapsed{width:64px;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid #1E2A3B;display:flex;align-items:center;gap:10;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00C6FF,#0052CC);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{color:#E2E8F0;font-weight:700;font-size:14px;white-space:nowrap;}
nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:none;background:transparent;color:#94A3B8;font-size:13px;font-weight:400;text-align:left;width:100%;white-space:nowrap;transition:background .15s,color .15s;}
.nav-btn:hover{background:#1E2A3B;color:#E2E8F0;}
.nav-btn.active{background:#00C6FF18;color:#00C6FF;font-weight:600;}
.nav-btn svg{flex-shrink:0;}
.sidebar-bottom{padding:12px 8px;border-top:1px solid #1E2A3B;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:14px 24px;border-bottom:1px solid #1E2A3B;display:flex;align-items:center;justify-content:space-between;background:#111827;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:24px;}
.page{display:none;flex-direction:column;gap:24px;}
.page.active{display:flex;}
.page-title{color:#E2E8F0;font-size:22px;font-weight:700;}
.page-sub{color:#94A3B8;font-size:13px;margin-top:4px;}

.stat-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px;}
.stat-label{color:#94A3B8;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;}
.stat-value{color:#E2E8F0;font-size:28px;font-weight:700;line-height:1;}
.stat-sub{color:#94A3B8;font-size:12px;}
.card{background:#111827;border:1px solid #1E2A3B;border-radius:12px;padding:20px;}
.card-title{color:#94A3B8;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}

table{width:100%;border-collapse:collapse;}

td{padding:12px 14px;border-bottom:1px solid #1E2A3B;font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even){background:#ffffff05;}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;display:inline-block;}

.badge-expired{background:#450A0A;color:#EF4444;}

.grid-form{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.modal-overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:1000;align-items:center;justify-content:center;padding:20px;}

.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.search-wrap{position:relative;}

.search-wrap input{padding-left:34px;width:210px;}

.minibar{display:flex;align-items:flex-end;gap:4px;height:48px;}
.minibar-bar{flex:1;border-radius:3px 3px 0 0;}
.minibar-labels{display:flex;justify-content:space-between;margin-top:8px;}
.minibar-labels span{color:#94A3B8;font-size:11px;}
.pkg-card{background:#111827;border:1px solid #1E2A3B;border-radius:14px;padding:22px;position:relative;overflow:hidden;}
.pkg-top-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.pkg-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.pkg-price{font-size:32px;font-weight:800;color:#E2E8F0;margin-top:4px;}
.pkg-period{color:#94A3B8;font-size:12px;}
.pkg-rows{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.pkg-row{display:flex;justify-content:space-between;}
.pkg-row span:first-child{color:#94A3B8;font-size:13px;}
.pkg-row span:last-child{color:#E2E8F0;font-size:13px;font-weight:500;}

.chat-area{flex:1;background:#111827;border:1px solid #1E2A3B;border-radius:12px;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}

.sugg-btn{background:#1E2A3B;color:#94A3B8;border:none;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;}
.sugg-btn:hover{color:#E2E8F0;}
.dist-bar-wrap{flex:2;background:#1E2A3B;border-radius:4px;height:6px;overflow:hidden;}
.dist-bar-fill{height:100%;border-radius:4px;}
.toggle{width:36px;height:18px;border-radius:9px;position:relative;cursor:pointer;border:none;}
.toggle-knob{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;transition:left .2s;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#10B981;}
.row-actions{display:flex;gap:6px;}
.divider{border:none;border-top:1px solid #1E2A3B;margin:12px 0;}
.finance-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1E2A3B;}
.dots{display:flex;align-items:center;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 1s infinite;}
.ovx{overflow-x:auto;}
.section-head{padding:14px 16px;border-bottom:1px solid #1E2A3B;color:#E2E8F0;font-size:13px;font-weight:600;}
.mikro-feature{background:#111827;border:1px solid #1E2A3B;border-radius:10px;padding:14px;}
.mikro-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.reseller-conn{display:flex;flex-direction:column;gap:14px;background:#111827;border:1px solid #1E2A3B;border-radius:12px;padding:20px;}
.ai-page{display:none;flex-direction:column;gap:16px;height:calc(100vh - 140px);}
.ai-page.active{display:flex;}
</style>
</head>

<script>

let tickets = [

  {id:"R002",name:"Bright Connect",mobile:"0321-2222222",city:"Karachi",balance:8500,customers:7,commission:1200,status:"Active"},

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getPkg(id){return packages.find(p=>p.id===id)||{};}
function badge(status){
  const map={Active:"active",Expired:"expired",Open:"open",Pending:"pending",Resolved:"resolved",Paid:"paid",Overdue:"overdue",High:"high",Medium:"medium",Low:"low"};
  return `<span class="badge badge-${map[status]||"pending"}">${status}</span>`;
}
function icon(name,size=18,color="currentColor"){
  const svgs={
    plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
    edit:`<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>`,
    trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>`,
    search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
    check:`<polyline points="20 6 9 17 4 12"/>`,
    send:`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
    download:`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`,
    alert:`<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  };
  return `<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24">${svgs[name]||""}</svg>`;
}
function minibar(data,color){
  const max=Math.max(...data);
  return `<div class="minibar">${data.map(v=>`<div class="minibar-bar" style="height:${Math.round((v/max)*100)}%;background:${color};opacity:${0.3+(v/max)*0.7};"></div>`).join("")}</div>`;
}
function statCard(label,value,sub,color,ico=""){
  return `<div class="stat-card">
    <div class="stat-bar" style="background:${color}"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="stat-label">${label}</span>
    </div>
    <span class="stat-value">${value}</span>
    ${sub?`<span class="stat-sub">${sub}</span>`:""}
  </div>`;
}
function field(label,id,type="text",value="",placeholder=""){
  return `<div class="field"><label for="${id}">${label}</label>
    <input type="${type}" id="${id}" value="${esc(value)}" placeholder="${esc(placeholder)}"/>
  </div>`;
}
function selectField(label,id,options,selected=""){
  return `<div class="field"><label for="${id}">${label}</label>
    <select id="${id}">${options.map(o=>`<option value="${esc(o.value)}" ${o.value===selected?"selected":""}>${esc(o.label)}</option>`).join("")}</select>
  </div>`;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function gv(id){const el=document.getElementById(id);return el?el.value:"";}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title,body){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=body;
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}

let currentPage = "dashboard";
let sidebarCollapsed = false;

function buildNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = PAGES.map(p=>`
    <button class="nav-btn ${p.id===currentPage?"active":""}" onclick="goTo('${p.id}')">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${p.svg}</svg>
      <span class="nav-label">${p.label}</span>
    </button>
  `).join("");
}

function goTo(id){
  currentPage=id;
  buildNav();
  renderPage(id);
}

function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  const s=document.getElementById("sidebar");
  s.classList.toggle("collapsed",sidebarCollapsed);
  document.querySelectorAll(".nav-label,.logo-text,#collapse-label").forEach(el=>{
    el.style.display=sidebarCollapsed?"none":"";
  });
}

// ── RENDER PAGES ──────────────────────────────────────────────────────────────
function renderPage(id){
  const c=document.getElementById("content");
  const renderers={
    dashboard:renderDashboard,
    customers:renderCustomers,
    packages:renderPackages,
    billing:renderBilling,
    tickets:renderTickets,
    resellers:renderResellers,
    mikrotik:renderMikroTik,
    finance:renderFinance,
    ai:renderAI,
  };
  c.innerHTML = (renderers[id]||renderDashboard)();
  if(id==="ai") initAI();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

  const active=customers.filter(c=>c.status==="Active").length;
  const expired=customers.filter(c=>c.status==="Expired").length;
  const unpaid=customers.filter(c=>!c.paid).length;
  const rev=transactions.filter(t=>t.status==="Paid").reduce((a,b)=>a+b.amount,0);
  const openT=tickets.filter(t=>t.status==="Open").length;
  const pkgDist=packages.map(p=>({name:p.name,color:p.color,count:customers.filter(c=>c.packageId===p.id).length}));
  return `
  <h1 class="page-title">Dashboard</h1>
  <p class="page-sub">${new Date().toLocaleDateString("en-PK",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
  <div class="grid-stats">
    ${statCard("Total Customers",customers.length,`${active} active`,"#00C6FF")}
    ${statCard("Active",active,"Connected","#10B981")}
    ${statCard("Expired",expired,"Need renewal","#EF4444")}
    ${statCard("Revenue","Rs."+rev.toLocaleString(),"Collected","#F59E0B")}
    ${statCard("Pending Bills",unpaid,"Unpaid","#F59E0B")}
    ${statCard("Open Tickets",openT,"Support","#818CF8")}
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Revenue — Last 7 Days</div>
      ${minibar([45000,52000,48000,61000,55000,70000,68000],"#00C6FF")}
      <div class="minibar-labels">${["M","T","W","T","F","S","S"].map(d=>`<span>${d}</span>`).join("")}</div>
    </div>
    <div class="card">
      <div class="card-title">Customer Growth</div>
      ${minibar([20,28,35,42,48,52,57],"#10B981")}
      <div class="minibar-labels">${["W1","W2","W3","W4","W5","W6","W7"].map(d=>`<span>${d}</span>`).join("")}</div>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Package Distribution</div>
      ${pkgDist.map(p=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:10px;height:10px;border-radius:2px;background:${p.color};flex-shrink:0;"></div>
          <span style="color:#E2E8F0;font-size:13px;flex:1;">${p.name}</span>
          <div class="dist-bar-wrap"><div class="dist-bar-fill" style="width:${customers.length?(p.count/customers.length*100):0}%;background:${p.color};"></div></div>
          <span style="color:#94A3B8;font-size:12px;width:20px;text-align:right;">${p.count}</span>
        </div>
      `).join("")}
    </div>
    <div class="card">
      <div class="card-title">Recent Transactions</div>
      ${transactions.slice(0,5).map(t=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E2A3B;">
          <div>
            <div style="color:#E2E8F0;font-size:13px;font-weight:500;">${t.customerName}</div>
            <div style="color:#94A3B8;font-size:11px;">${t.method} · ${t.date}</div>
          </div>
          <div style="text-align:right;">
            <div style="color:#00C6FF;font-size:13px;font-weight:600;">Rs.${t.amount.toLocaleString()}</div>
            ${badge(t.status)}

function custSearch(v){goTo("customers");setTimeout(()=>{const el=document.getElementById("cust-search");if(el){el.value=v;el.focus();}},10);}

function openAddCustomer(){
  const pkgOpts=packages.map(p=>({value:p.id,label:`${p.name} — Rs.${p.price}`}));
  openModal("Add Customer",`
    <div class="grid-form">
      ${field("Customer ID","f-id","text",`C00${customers.length+1}`)}
      ${field("Full Name","f-name")}
      ${field("Mobile","f-mobile","text","")}
      ${field("CNIC","f-cnic")}
      <div class="span2">${field("Address","f-address")}</div>
      ${field("Router MAC","f-mac")}
      ${field("Username","f-username")}
      ${field("Password","f-password","password")}
      ${selectField("Package","f-pkg",pkgOpts,"pkg1")}
      ${selectField("Status","f-status",[{value:"Active",label:"Active"},{value:"Expired",label:"Expired"}],"Active")}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer(null)">${icon("check",16,"#0A0F1E")} Save</button>
    </div>`);
}
function openEditCustomer(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const pkgOpts=packages.map(p=>({value:p.id,label:`${p.name} — Rs.${p.price}`}));
  openModal("Edit Customer",`
    <div class="grid-form">
      ${field("Customer ID","f-id","text",c.id)}
      ${field("Full Name","f-name","text",c.name)}
      ${field("Mobile","f-mobile","text",c.mobile)}
      ${field("CNIC","f-cnic","text",c.cnic)}
      <div class="span2">${field("Address","f-address","text",c.address)}</div>
      ${field("Router MAC","f-mac","text",c.mac)}
      ${field("Username","f-username","text",c.username)}
      ${field("Password","f-password","password",c.password)}
      ${selectField("Package","f-pkg",pkgOpts,c.packageId)}
      ${selectField("Status","f-status",[{value:"Active",label:"Active"},{value:"Expired",label:"Expired"}],c.status)}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer('${id}')">${icon("check",16,"#0A0F1E")} Save</button>
    </div>`);
}
function saveCustomer(editId){
  const obj={id:gv("f-id"),name:gv("f-name"),mobile:gv("f-mobile"),cnic:gv("f-cnic"),address:gv("f-address"),mac:gv("f-mac"),username:gv("f-username"),password:gv("f-password"),packageId:gv("f-pkg"),status:gv("f-status")};
  if(!obj.name){alert("Name required");return;}
  if(editId) customers=customers.map(c=>c.id===editId?{...c,...obj}:c);
  else customers.push({...obj,joinDate:new Date().toISOString().split("T")[0],expiry:"",paid:false});
  closeModal();goTo("customers");
}
function deleteCustomer(id){if(confirm("Delete this customer?"))customers=customers.filter(c=>c.id!==id);goTo("customers");}

        <div class="pkg-top-bar" style="background:${p.color};"></div>

          <div>
            <div class="pkg-name" style="color:${p.color};">${esc(p.name)}</div>
            <div class="pkg-price">Rs.${p.price.toLocaleString()}</div>
            <div class="pkg-period">per ${p.validity} days</div>
          </div>
          <div class="row-actions">
            <button class="btn-icon" onclick="openEditPackage('${p.id}')">${icon("edit",14,"#00C6FF")}</button>
            <button class="btn-icon" style="background:#EF444422;" onclick="deletePackage('${p.id}')">${icon("trash",14,"#EF4444")}</button>
          </div>
        </div>
        <div class="pkg-rows">
          ${[["Speed",p.speed],["Data",p.dataLimit],["Validity",p.validity+" Days"],["Auto Renewal",p.autoRenewal?"On":"Off"]].map(([k,v])=>`<div class="pkg-row"><span>${k}</span><span>${v}</span></div>`).join("")}
        </div>
        <div class="pkg-footer"><span style="color:#94A3B8;font-size:12px;">Status</span>${badge(p.active?"Active":"Expired")}</div>
      </div>

function openAddPackage(){
  openModal("New Package",pkgForm({}));
}
function openEditPackage(id){
  const p=packages.find(x=>x.id===id);if(!p)return;
  openModal("Edit Package",pkgForm(p));
}
function pkgForm(p){return `
  <input type="hidden" id="f-pkgid" value="${esc(p.id||"")}"/>
  <div class="grid-form">
    ${field("Package Name","f-pkgname","text",p.name||"")}
    ${field("Speed (e.g. 20 Mbps)","f-speed","text",p.speed||"")}
    ${field("Price (Rs)","f-price","number",p.price||"")}
    ${field("Validity (Days)","f-validity","number",p.validity||30)}
    ${field("Data Limit","f-datalimit","text",p.dataLimit||"Unlimited","e.g. 100 GB or Unlimited")}
    <div class="field"><label for="f-color">Accent Color</label><input type="color" id="f-color" value="${p.color||"#00C6FF"}"/></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="savePackage()">${icon("check",16,"#0A0F1E")} Save</button>
  </div>`;}
function savePackage(){
  const editId=gv("f-pkgid");
  const obj={id:editId||`pkg${Date.now()}`,name:gv("f-pkgname"),speed:gv("f-speed"),price:Number(gv("f-price")),validity:Number(gv("f-validity")),dataLimit:gv("f-datalimit"),color:gv("f-color"),autoRenewal:false,active:true};
  if(!obj.name||!obj.price){alert("Name and price required");return;}
  if(editId) packages=packages.map(p=>p.id===editId?{...p,...obj}:p);
  else packages.push(obj);
  closeModal();goTo("packages");
}
function deletePackage(id){if(confirm("Delete this package?"))packages=packages.filter(p=>p.id!==id);goTo("packages");}

// ── BILLING ───────────────────────────────────────────────────────────────────
let billingFilter="All";
function renderBilling(){
  const shown=billingFilter==="All"?transactions:transactions.filter(t=>t.status===billingFilter);
  const sum=s=>transactions.filter(t=>t.status===s).reduce((a,b)=>a+b.amount,0);
  return `
  <h1 class="page-title">Billing & Payments</h1>
  <div class="grid3">
    ${statCard("Collected","Rs."+sum("Paid").toLocaleString(),"","#10B981")}
    ${statCard("Pending","Rs."+sum("Pending").toLocaleString(),"","#F59E0B")}
    ${statCard("Overdue","Rs."+sum("Overdue").toLocaleString(),"","#EF4444")}
  </div>
  <div class="filter-tabs">
    ${["All","Paid","Pending","Overdue"].map(s=>`<button class="filter-tab ${billingFilter===s?"active":""}" onclick="setBillingFilter('${s}')">${s}</button>`).join("")}
  </div>
  <div class="table-wrap"><div class="ovx"><table>
    <thead><tr><th>Invoice</th><th>Customer</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${shown.map((t,i)=>`
      <tr>
        <td style="color:#00C6FF;font-weight:600;">${t.id}</td>
        <td style="color:#E2E8F0;">${esc(t.customerName)}</td>
        <td style="color:#E2E8F0;font-weight:600;">Rs.${t.amount.toLocaleString()}</td>
        <td><span style="background:#1E2A3B;color:#94A3B8;padding:3px 10px;border-radius:6px;font-size:12px;">${esc(t.method)}</span></td>
        <td style="color:#94A3B8;">${t.date}</td>
        <td>${badge(t.status)}</td>
      </tr>`).join("")}</tbody>
  </table></div></div>`;
}
function setBillingFilter(f){billingFilter=f;goTo("billing");}

function saveTicket(){
  const obj={id:`T00${tickets.length+1}`,customerId:gv("f-cid"),customerName:gv("f-cname"),issue:gv("f-issue"),desc:gv("f-desc"),priority:gv("f-priority"),status:"Open",created:new Date().toISOString().split("T")[0]};
  if(!obj.customerName){alert("Customer name required");return;}
  tickets.push(obj);closeModal();goTo("tickets");
}
function updateTicket(id,status){tickets=tickets.map(t=>t.id===id?{...t,status}:t);goTo("tickets");}

let mikroConnected=false;

  return `
  <h1 class="page-title">MikroTik Integration</h1>
  <div style="display:grid;grid-template-columns:280px 1fr;gap:16px;">
    <div class="reseller-conn">
      <div style="color:#E2E8F0;font-size:14px;font-weight:600;">Router Connection</div>
      ${field("Router IP","m-host","text","192.168.88.1")}
      ${field("API Port","m-port","text","8728")}
      ${field("Username","m-user","text","admin")}
      ${field("Password","m-pass","password")}
      <button class="btn btn-primary" onclick="mikroConnect()">${icon("check",16,"#0A0F1E")} ${mikroConnected?"Reconnect":"Connect"}</button>
      <div id="mikro-status" style="background:${mikroConnected?"#064E3B":"#1E2A3B"};color:${mikroConnected?"#10B981":"#94A3B8"};padding:8px 12px;border-radius:8px;font-size:12px;display:${mikroConnected?"block":"none"};">
        Connected via RouterOS API
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="mikro-grid">
        ${[
          {label:"Auto User Creation",desc:"Create PPPoE/Hotspot on activation",color:"#10B981"},
          {label:"Auto Expiry",desc:"Disable users on expiry",color:"#F59E0B"},
          {label:"Bandwidth Control",desc:"Apply speed limits per package",color:"#00C6FF"},
          {label:"Session Monitor",desc:"Track active sessions live",color:"#818CF8"},
        ].map((f,i)=>`
          <div class="mikro-feature">
            <div style="color:${f.color};font-size:13px;font-weight:600;margin-bottom:4px;">${f.label}</div>
            <div style="color:#94A3B8;font-size:12px;margin-bottom:10px;">${f.desc}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:36px;height:18px;border-radius:9px;background:${mikroConnected?f.color:"#1E2A3B"};position:relative;">
                <div style="position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:${mikroConnected?20:2}px;transition:left .2s;"></div>
              </div>
              <span style="color:#94A3B8;font-size:12px;">${mikroConnected?"Active":"Off"}</span>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="table-wrap">
        <div class="section-head">PPPoE User Sync — ${active.length} accounts</div>
        <div class="ovx"><table>
          <thead><tr><th>Username</th><th>MAC</th><th>Package</th><th>Speed</th><th>Sync</th></tr></thead>
          <tbody>${active.slice(0,6).map(cu=>{const pk=getPkg(cu.packageId);return`
            <tr>
              <td style="color:#E2E8F0;">${esc(cu.username)}</td>
              <td style="color:#94A3B8;font-family:monospace;font-size:12px;">${esc(cu.mac)}</td>
              <td style="color:#94A3B8;">${esc(pk.name||"-")}</td>
              <td style="color:#94A3B8;">${esc(pk.speed||"-")}</td>
              <td>${badge(mikroConnected?"Active":"Pending")}</td>
            </tr>`;}).join("")}
          </tbody>
        </table></div>
      </div>
    </div>
  </div>`;
}
function mikroConnect(){
  mikroConnected=true;
  goTo("mikrotik");
}

// ── FINANCE ───────────────────────────────────────────────────────────────────
function renderFinance(){
  const income=transactions.filter(t=>t.status==="Paid").reduce((a,b)=>a+b.amount,0);
  const expenses=[{label:"Staff Salary",amount:45000},{label:"Server / VPS",amount:8000},{label:"Office Rent",amount:15000},{label:"Miscellaneous",amount:5000}];
  const totalExp=expenses.reduce((a,b)=>a+b.amount,0);
  const profit=income-totalExp;
  return `
  <h1 class="page-title">Finance</h1>
  <div class="grid3">
    ${statCard("Total Income","Rs."+income.toLocaleString(),"","#10B981")}
    ${statCard("Total Expenses","Rs."+totalExp.toLocaleString(),"","#EF4444")}
    ${statCard("Net Profit","Rs."+profit.toLocaleString(),"",profit>=0?"#10B981":"#EF4444")}
  </div>
  <div class="grid2">
    <div class="card">
      <div style="color:#E2E8F0;font-size:14px;font-weight:600;margin-bottom:16px;">Expense Breakdown</div>
      ${expenses.map(e=>`
        <div class="finance-row">
          <span style="color:#94A3B8;font-size:13px;">${e.label}</span>
          <span style="color:#EF4444;font-size:13px;font-weight:600;">Rs.${e.amount.toLocaleString()}</span>
        </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding-top:12px;margin-top:4px;">
        <span style="color:#E2E8F0;font-size:14px;font-weight:700;">Total</span>
        <span style="color:#EF4444;font-size:14px;font-weight:700;">Rs.${totalExp.toLocaleString()}</span>
      </div>
    </div>
    <div class="card">
      <div style="color:#E2E8F0;font-size:14px;font-weight:600;margin-bottom:16px;">Profit Summary</div>
      ${[["Total Income",income,"#10B981"],["Total Expenses",totalExp,"#EF4444"],["Net Profit",profit,profit>=0?"#10B981":"#EF4444"]].map(([l,v,c])=>`
        <div class="finance-row">
          <span style="color:#94A3B8;font-size:13px;">${l}</span>
          <span style="color:${c};font-size:14px;font-weight:700;">Rs.${v.toLocaleString()}</span>
        </div>`).join("")}
      <div style="margin-top:24px;text-align:center;">
        <button class="btn btn-primary">${icon("download",16,"#0A0F1E")} Export Report</button>
      </div>
    </div>
  </div>`;
}

// ── AI ASSISTANT ──────────────────────────────────────────────────────────────
let aiMessages=[{role:"assistant",text:"I'm your WiFi Management System AI assistant. Ask me anything about your customers, revenue, packages, or support tickets."}];
let aiLoading=false;

function renderAI(){
  return `
  <div style="display:flex;flex-direction:column;gap:16px;height:calc(100vh - 140px);">
    <div>
      <h1 class="page-title" style="display:flex;align-items:center;gap:10px;">
        <svg width="22" height="22" fill="none" stroke="#00C6FF" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
          <line x1="10" y1="22" x2="14" y2="22"/>
        </svg>
        AI Assistant
      </h1>
      <p class="page-sub">Powered by Claude — knows your live data</p>
    </div>
    <div class="chat-area" id="chat-area">${renderMessages()}</div>
    <div class="chat-input-row">
      <input class="chat-input" id="ai-input" type="text" placeholder="Ask about revenue, customers, expiring accounts..." onkeydown="if(event.key==='Enter')sendAI()"/>
      <button class="btn btn-primary" id="ai-send-btn" onclick="sendAI()">${icon("send",16,"#0A0F1E")}</button>
    </div>
    <div class="suggestions">
      ${["Which customers are expiring soon?","How much revenue this month?","List unpaid customers","Which package sells most?"].map(q=>`
        <button class="sugg-btn" onclick="document.getElementById('ai-input').value='${q}'">${q}</button>`).join("")}
    </div>
  </div>`;
}

function renderMessages(){
  return aiMessages.map(m=>`
    <div class="chat-msg ${m.role==="user"?"user":""}">
      <div class="bubble ${m.role==="user"?"bubble-user":"bubble-ai"}">${esc(m.text)}</div>
    </div>`).join("")+(aiLoading?`
    <div class="chat-msg"><div class="dots">
      <div class="dot" style="background:#00C6FF;animation-delay:0s;"></div>
      <div class="dot" style="background:#00C6FF;animation-delay:.2s;"></div>
      <div class="dot" style="background:#00C6FF;animation-delay:.4s;"></div>
    </div></div>`:"");
}

function initAI(){}

async function sendAI(){
  const input=document.getElementById("ai-input");
  if(!input||!input.value.trim()||aiLoading)return;
  const q=input.value.trim();
  input.value="";
  aiMessages.push({role:"user",text:q});
  aiLoading=true;
  updateChat();

  const income=transactions.filter(t=>t.status==="Paid").reduce((a,b)=>a+b.amount,0);
  const sys=`You are the AI assistant for WiFi Management System, built by Suhail Ahmed — a Pakistani ISP management tool.
Live data:
CUSTOMERS(${customers.length}): Active=${customers.filter(c=>c.status==="Active").length}, Expired=${customers.filter(c=>c.status==="Expired").length}, Unpaid=${customers.filter(c=>!c.paid).length}
${customers.map(c=>`${c.id}:${c.name},${c.mobile},pkg=${getPkg(c.packageId).name},${c.status},paid=${c.paid},expiry=${c.expiry}`).join("\n")}
PACKAGES: ${packages.map(p=>`${p.name}(Rs.${p.price}/${p.validity}d,${p.speed})`).join(", ")}
REVENUE: Collected=Rs.${income.toLocaleString()}, Pending=Rs.${transactions.filter(t=>t.status==="Pending").reduce((a,b)=>a+b.amount,0).toLocaleString()}, Overdue=Rs.${transactions.filter(t=>t.status==="Overdue").reduce((a,b)=>a+b.amount,0).toLocaleString()}
TICKETS: Open=${tickets.filter(t=>t.status==="Open").length}, Pending=${tickets.filter(t=>t.status==="Pending").length}, Resolved=${tickets.filter(t=>t.status==="Resolved").length}
Be concise and helpful. Give actionable ISP management advice.`;

  try{
    const history=aiMessages.slice(-8).map(m=>({role:m.role,content:m.text}));
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:history})
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||"Could not get a response.";
    aiMessages.push({role:"assistant",text:txt});
  }catch(e){
    aiMessages.push({role:"assistant",text:"Connection error. Please check your internet connection."});
  }
  aiLoading=false;
  updateChat();
}

function updateChat(){
  const area=document.getElementById("chat-area");
  if(area){area.innerHTML=renderMessages();area.scrollTop=area.scrollHeight;}
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const el=document.getElementById("clock");
  if(el) el.textContent=new Date().toLocaleTimeString("en-PK");
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildNav();
renderPage("dashboard");
updateClock();
setInterval(updateClock,1000);
</script>
